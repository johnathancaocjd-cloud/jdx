name: Daily Briefing

on:
  schedule:
    # 01:00 UTC = 09:00 HKT
    - cron: '0 1 * * *'
  workflow_dispatch: # allow manual trigger for testing

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install groq yfinance

      - name: Install weasyprint system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libcairo2 \
            fonts-liberation shared-mime-info
          pip install weasyprint

      - name: Generate briefing HTML + rebuild index
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_briefing.py

      - name: Generate PDFs + update archive
        run: python scripts/update_site.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: daily briefing $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
