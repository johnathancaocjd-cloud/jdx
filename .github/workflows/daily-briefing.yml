name: Daily Briefing

on:
  schedule:
    # 01:00 UTC = 09:00 HKT
    - cron: '0 1 * * *'
  workflow_dispatch: # allow manual runs for testing

permissions:
  contents: write # needed to commit generated briefings back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install anthropic

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # TODO: replace this placeholder with the real generation script
          echo "TODO: generate briefing for $(date -u +'%Y-%m-%d')"

      - name: Commit and push new briefing
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "chore: daily briefing $(date -u +'%Y-%m-%d')"
            git push
          fi
